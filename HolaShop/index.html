<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiHtwin Online Class - Special Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            color: #f8fafc;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            width: 480px; /* Even larger wheel */
            height: 480px;
            margin: 0 auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 12px solid #334155;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.6), 0 0 30px rgba(59, 130, 246, 0.2);
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
            background: #1e293b;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #ef4444;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 20;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            z-index: 15;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        }

        .spin-ready {
            animation: pulse-glow 2s infinite;
        }

        .text-micro { font-size: 11px; }
        .text-nano { font-size: 9px; }
    </style>
</head>
<body class="p-4">

    <header class="mb-4 text-center">
        <h1 class="text-xl md:text-2xl font-extrabold tracking-tight mb-0.5 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
            TiHtwin Online
        </h1>
        <p class="text-slate-400 text-nano uppercase tracking-widest">Alumni Appreciation Rewards</p>
    </header>

    <div id="login-card" class="glass w-full max-w-xs p-5 rounded-2xl shadow-2xl space-y-3">
        <div class="space-y-0.5">
            <h2 class="text-sm font-semibold text-white">Student Login</h2>
            <p class="text-nano text-slate-400">Enter your registered Phone or Email.</p>
        </div>
        
        <div class="space-y-2">
            <input type="text" id="student-id" 
                class="w-full bg-slate-900/50 border border-slate-700 text-white text-xs rounded-lg px-3 py-2.5 outline-none focus:ring-1 focus:ring-blue-500 transition-all"
                placeholder="09... or email@gmail.com">
            <button onclick="verifyStudent()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-lg transition-all text-xs">
                Enter Event
            </button>
        </div>
        
        <div id="error-msg" class="hidden text-red-400 text-[10px] text-center bg-red-400/10 py-1 rounded">
            Student record not found.
        </div>
    </div>

    <div id="game-section" class="hidden flex flex-col items-center w-full space-y-4">
        <div class="text-center">
            <h3 class="text-sm font-bold text-white mb-0.5" id="student-name-display">Welcome!</h3>
            <p class="text-nano text-slate-400">GOOD LUCK! <span class="text-yellow-400 font-bold">1 SPIN LEFT</span></p>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="center-hub">
                <div class="w-2 h-2 bg-slate-400 rounded-full"></div>
            </div>
            <canvas id="wheel"></canvas>
        </div>

        <button id="spin-button" onclick="handleSpin()" 
            class="spin-ready bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 text-slate-900 font-black text-sm px-12 py-3 rounded-xl shadow-lg transform active:scale-95 transition-all">
            SPIN THE WHEEL
        </button>
    </div>

    <div id="result-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md">
        <div class="glass max-w-xs w-full p-6 rounded-3xl text-center space-y-4">
            <div class="text-4xl">🎁</div>
            <div class="space-y-1">
                <h2 class="text-lg font-bold text-white">Winner!</h2>
                <p class="text-nano text-slate-400">You won a prize from TiHtwin Online!</p>
            </div>
            <div class="bg-blue-500/20 py-4 rounded-xl border border-blue-500/30">
                <span id="prize-text" class="text-xl font-black text-blue-400 uppercase">PRIZE NAME</span>
            </div>
            <div class="text-left bg-slate-900/50 p-3 rounded-lg space-y-0.5">
                <p class="text-slate-500 text-[8px] uppercase tracking-tighter">Claim ID</p>
                <p id="claim-id" class="text-white font-mono text-sm select-all">TH-XXXX-XXXX</p>
                <p class="text-[9px] text-slate-500 mt-1">Please take a screenshot of this result.</p>
            </div>
            <button onclick="location.reload()" class="text-slate-500 hover:text-white text-nano transition-colors uppercase font-bold">
                Close
            </button>
        </div>
    </div>

    <script>
        const students = [
            { name: "Mg Shine Htet Bo Bo", contacts: ["09960507783", "shinehtetb787@gmail.com", "tharrlaymaymay3@gmail.com"] },
            { name: "Yoon Nathan (John)", contacts: ["09786639047", "jason099650@gmail.com"] },
            { name: "Myo Mahar Kyaw", contacts: ["095057885", "09976751376", "kevindriftintokyo@gmail.com"] },
            { name: "Shine Htet Kyaw", contacts: ["09795583345", "shinehk468@gmail.com"] },
            { name: "Khant Htet Aung", contacts: ["09402522536", "ayemyamon.mdy88@gmail.com"] },
            { name: "Zay Khant Naing", contacts: ["09252566954", "itstudio7@gmail.com"] },
            { name: "Shwe Nyan (Jedi)", contacts: ["09796657113", "thin.flower@gmail.com"] },
            { name: "Mg Phyo Myat (Willian)", contacts: ["09943185155", "iconicboys802@gmail.com"] }
        ];

        // Prize config with probabilities (weights)
        // 50% DISCOUNT and 50,000 MMK are intentionally made very rare
        const prizes = [
            { text: "50% DISCOUNT", color: "#1e3a8a", weight: 1 },    // 1% chance
            { text: "5,000 MMK CASHBACK", color: "#1e40af", weight: 20 }, 
            { text: "20% DISCOUNT", color: "#1d4ed8", weight: 20 },
            { text: "10,000 MMK CASHBACK", color: "#2563eb", weight: 10 },
            { text: "30% DISCOUNT", color: "#3b82f6", weight: 10 },
            { text: "50,000 MMK CASHBACK", color: "#1e3a8a", weight: 2 }, // 2% chance
            { text: "15% DISCOUNT", color: "#1e40af", weight: 20 },
            { text: "2,000 MMK CASHBACK", color: "#1d4ed8", weight: 17 }
        ];

        let currentUser = null;
        let isSpinning = false;
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');

        function verifyStudent() {
            const input = document.getElementById('student-id').value.trim().toLowerCase();
            const errorMsg = document.getElementById('error-msg');
            
            const student = students.find(s => 
                s.contacts.some(c => c.toLowerCase() === input)
            );

            if (!student) {
                errorMsg.classList.remove('hidden');
                return;
            }

            if (localStorage.getItem('tihtwin_spin_v2_' + student.name)) {
                const data = JSON.parse(localStorage.getItem('tihtwin_spin_v2_' + student.name));
                alert(`You already spun! Your prize: ${data.prize}. Code: ${data.code}`);
                return;
            }

            currentUser = student;
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            document.getElementById('student-name-display').innerText = `Verified: ${student.name}`;
            initWheel();
        }

        function initWheel() {
            const size = 480;
            canvas.width = size * window.devicePixelRatio;
            canvas.height = size * window.devicePixelRatio;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            drawWheel();
        }

        function drawWheel() {
            const centerX = 240;
            const centerY = 240;
            const radius = 230;
            const sliceAngle = (2 * Math.PI) / prizes.length;

            prizes.forEach((prize, i) => {
                const startAngle = i * sliceAngle;
                
                ctx.beginPath();
                ctx.fillStyle = prize.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 12px Inter";
                ctx.fillText(prize.text, radius - 30, 5);
                ctx.restore();
            });
        }

        function getWeightedWinner() {
            const totalWeight = prizes.reduce((acc, p) => acc + p.weight, 0);
            let random = Math.floor(Math.random() * totalWeight);
            
            for (let i = 0; i < prizes.length; i++) {
                if (random < prizes[i].weight) return i;
                random -= prizes[i].weight;
            }
            return 0;
        }

        function handleSpin() {
            if (isSpinning) return;
            isSpinning = true;

            const spinBtn = document.getElementById('spin-button');
            spinBtn.disabled = true;
            spinBtn.classList.remove('spin-ready');
            spinBtn.innerText = "WAITING...";

            // 1. Pick the winner BEFORE spinning (rigged logic)
            const winningIndex = getWeightedWinner();
            
            // 2. Calculate degrees
            // The pointer is at the top (270 degrees).
            // Slice 0 starts at 0 rad (3 o'clock).
            // To make Slice X land at 270 degrees:
            const sliceSize = 360 / prizes.length;
            const extraRotations = 8 * 360; // Smooth long spin
            
            // Calculate necessary rotation to put winningIndex under the pointer (at 270deg)
            // Target angle to land pointer in the middle of the segment
            const stopAngle = (360 - (winningIndex * sliceSize)) + 270 - (sliceSize / 2);
            const totalRotation = extraRotations + stopAngle;

            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                showResult(winningIndex);
            }, 6200);
        }

        function showResult(winIndex) {
            const win = prizes[winIndex];
            const claimCode = `TH-${Math.random().toString(36).substr(2, 4).toUpperCase()}-${Math.random().toString(36).substr(2, 4).toUpperCase()}`;

            document.getElementById('prize-text').innerText = win.text;
            document.getElementById('claim-id').innerText = claimCode;
            document.getElementById('result-modal').classList.remove('hidden');

            localStorage.setItem('tihtwin_spin_v2_' + currentUser.name, JSON.stringify({
                prize: win.text,
                code: claimCode,
                date: new Date().toISOString()
            }));

            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#3b82f6', '#fbbf24', '#ffffff']
            });
        }
    </script>
</body>
</html>
